name: quran_app
description: "A production-ready Islamic Quran mobile application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  go_router: ^14.8.1
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2
  shared_preferences: ^2.3.4
  just_audio: ^0.9.42
  audio_session: ^0.1.21
  flutter_downloader: ^1.11.3
  connectivity_plus: ^6.1.2
  permission_handler: ^11.3.1
  easy_localization: ^3.0.7+1
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  path_provider: ^2.1.5
  path: ^1.9.1
  share_plus: ^10.1.4
  screenshot: ^3.0.0
  image_gallery_saver: ^2.0.3
  shimmer: ^3.0.0
  equatable: ^2.0.7
  cached_network_image: ^3.4.1
  lottie: ^3.2.0
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  isar_community_generator: ^3.3.2
  build_runner: ^2.4.14
  freezed_annotation: ^2.4.4
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/l10n/
